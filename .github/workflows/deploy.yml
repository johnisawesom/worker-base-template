name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy openclaw-coordinator
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: fly-deploy-${{ github.ref }}
      cancel-in-progress: false   # never cancel an in-flight deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io (Sydney)
        run: flyctl deploy --remote-only --region syd --app openclaw-coordinator
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_REGION: syd
          FLY_APP: openclaw-coordinator
